name: Deploy Curious Earth to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @workspace/curious-earth run build
        env:
          BASE_PATH: /
          PORT: '3000'
          NODE_ENV: production

      - name: Add SPA fallback (404.html)
        run: cp artifacts/curious-earth/dist/public/index.html artifacts/curious-earth/dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/curious-earth/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
